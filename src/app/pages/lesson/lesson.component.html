<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>Leçon {{ id }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (loaded) {
    <ion-card class="image-card" (click)="setOpen(true)">
      <div class="row">
        <ion-img class="thumb" [src]="src"></ion-img>
        <div class="meta">
          <ion-card-title>{{ title }}</ion-card-title>
          <p class="desc">{{ description }}</p></div>
      </div>
    </ion-card>
    <ion-modal [isOpen]="isModalOpen">
      <ng-template>
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-button (click)="setOpen(false)">
                <ion-icon name="close-outline"></ion-icon>
              </ion-button>
            </ion-buttons>
            <ion-buttons slot="end">
              <ion-button (click)="downloadImage()">
                <ion-icon name="cloud-download-outline"></ion-icon>
                &nbsp;
                Télécharger l'image
              </ion-button>
            </ion-buttons>
          </ion-toolbar>
        </ion-header>
        <ion-content [fullscreen]="true">
          <ion-img [src]="src"></ion-img>
        </ion-content>
      </ng-template>
    </ion-modal>
    <div class="lesson-cards-container">
      @for (card of cards; track card.id) {
        <ion-card class="lesson-card" [class.flipped]="isFlipped(card.id)" (click)="toggleFlip(card.id)">
          <div class="flip-inner">
            <!-- Face question -->
            <div class="face front">
              <ion-card-header>
                <ion-card-title>{{ card.question }}</ion-card-title>
              </ion-card-header>
              <ion-card-content>
<!--                <ion-button size="small" fill="outline" (click)="toggleFlip(card.id)">-->
<!--                  Voir la réponse-->
<!--                </ion-button>-->
              </ion-card-content>
            </div>

            <!-- Face réponse -->
            <div class="face back">
              <ion-card-header>
                <ion-card-title>Réponse</ion-card-title>
              </ion-card-header>
              <ion-card-content>
                <p>{{ card.answer }}</p>
<!--                <ion-button size="small" fill="solid" (click)="toggleFlip(card.id)">-->
<!--                  Revenir à la question-->
<!--                </ion-button>-->
              </ion-card-content>
            </div>
          </div>
        </ion-card>
      }
    </div>

  } @else {
    <ion-list class="no-bg">
      <ion-list-header>
        <ion-skeleton-text [animated]="true" style="width: 80px"></ion-skeleton-text>
      </ion-list-header>
      <ion-item class="no-bg">
        <ion-thumbnail slot="start" class="no-bg">
          <ion-skeleton-text [animated]="true"></ion-skeleton-text>
        </ion-thumbnail>
        <ion-label class="no-bg">
          <h3>
            <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
          </h3>
          <p>
            <ion-skeleton-text [animated]="true" style="width: 60%;"></ion-skeleton-text>
          </p>
          <p>
            <ion-skeleton-text [animated]="true" style="width: 30%;"></ion-skeleton-text>
          </p>
        </ion-label>
      </ion-item>
    </ion-list>
  }
</ion-content>
